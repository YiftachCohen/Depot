<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Starburst Grid — Center Element Exploration</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif; padding: 40px; }
  h1 { text-align: center; font-size: 24px; font-weight: 600; margin-bottom: 8px; }
  .subtitle { text-align: center; color: #64748b; margin-bottom: 40px; font-size: 13px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 28px; max-width: 1500px; margin: 0 auto; }
  .card {
    background: #13131a; border: 1px solid #1e1e2e; border-radius: 16px; padding: 28px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    cursor: pointer; transition: all 0.2s;
  }
  .card:hover { border-color: #6366f1; transform: translateY(-2px); }
  .card.selected { border-color: #06b6d4; box-shadow: 0 0 0 2px #06b6d4; }
  .previews { display: flex; gap: 14px; align-items: center; }
  .p-dark { background: #0c0a1d; padding: 14px; border-radius: 16px; }
  .p-light { background: #f0f0f5; padding: 14px; border-radius: 16px; }
  .p-sm-dark { background: #0c0a1d; padding: 6px; border-radius: 8px; }
  .p-sm-light { background: #f0f0f5; padding: 6px; border-radius: 8px; }
  .label { font-size: 14px; font-weight: 600; }
  .desc { font-size: 11px; color: #64748b; text-align: center; line-height: 1.5; }
  .num { background: #1e1e2e; color: #818cf8; width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
  .banner { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #06b6d4; color: #000; padding: 12px 24px; border-radius: 12px; font-weight: 600; font-size: 14px; z-index: 10; }
  .banner.show { display: block; }
</style>
</head>
<body>

<h1>Center Element Exploration</h1>
<p class="subtitle">What replaces the white dot in the Starburst Grid? Each variation shown at 96px, 96px light, 48px, and 24px.</p>

<div class="grid" id="grid"></div>
<div class="banner" id="banner"></div>

<script>
// Base grid without center element — caller appends center content
function base(s, centerSvg) {
  const scale = s / 512;
  return `<svg width="${s}" height="${s}" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="gl-${s}" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <circle cx="256" cy="256" r="200" fill="url(#gl-${s})"/>
    <rect x="108" y="108" width="80" height="80" rx="14" fill="#a78bfa" opacity="0.6"/>
    <rect x="216" y="108" width="80" height="80" rx="14" fill="#818cf8" opacity="0.75"/>
    <rect x="324" y="108" width="80" height="80" rx="14" fill="#a78bfa" opacity="0.6"/>
    <rect x="108" y="216" width="80" height="80" rx="14" fill="#818cf8" opacity="0.75"/>
    <rect x="216" y="216" width="80" height="80" rx="18" fill="#06b6d4"/>
    <rect x="324" y="216" width="80" height="80" rx="14" fill="#818cf8" opacity="0.75"/>
    <rect x="108" y="324" width="80" height="80" rx="14" fill="#a78bfa" opacity="0.6"/>
    <rect x="216" y="324" width="80" height="80" rx="14" fill="#818cf8" opacity="0.75"/>
    <rect x="324" y="324" width="80" height="80" rx="14" fill="#a78bfa" opacity="0.6"/>
    ${centerSvg}
  </svg>`;
}

const V = [
  {
    name: "Original Dot",
    desc: "Current design — plain white circle for reference.",
    center: `<circle cx="256" cy="256" r="16" fill="#fff"/>`
  },
  {
    name: "Bot Face",
    desc: "Tiny robot face — two eyes and an antenna. Friendly AI agent.",
    center: `
      <line x1="256" y1="232" x2="256" y2="222" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      <circle cx="256" cy="218" r="5" fill="#fff"/>
      <rect x="238" y="240" width="36" height="28" rx="8" fill="#fff"/>
      <circle cx="248" cy="252" r="4" fill="#06b6d4"/>
      <circle cx="264" cy="252" r="4" fill="#06b6d4"/>
    `
  },
  {
    name: "Sparkle",
    desc: "Four-pointed AI sparkle/star. Universal symbol for AI/magic.",
    center: `
      <path d="M256,232 C258,244 268,254 280,256 C268,258 258,268 256,280 C254,268 244,258 232,256 C244,254 254,244 256,232Z" fill="#fff"/>
    `
  },
  {
    name: "Sparkle + Dot",
    desc: "Small sparkle with a center dot. Compact and punchy.",
    center: `
      <path d="M256,236 C257.5,246 266,254.5 276,256 C266,257.5 257.5,266 256,276 C254.5,266 246,257.5 236,256 C246,254.5 254.5,246 256,236Z" fill="#fff" opacity="0.85"/>
      <circle cx="256" cy="256" r="5" fill="#fff"/>
    `
  },
  {
    name: "Cursor Arrow",
    desc: "Mouse pointer cursor. You're in control — click to deploy.",
    center: `
      <path d="M244,234 L244,278 L254,268 L266,280 L272,274 L260,262 L272,256 Z" fill="#fff"/>
    `
  },
  {
    name: "Terminal Prompt",
    desc: "Blinking cursor/chevron prompt. Code-native, developer-first.",
    center: `
      <path d="M240,244 L258,256 L240,268" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="262" y1="268" x2="278" y2="268" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    `
  },
  {
    name: "Play Arrow",
    desc: "Forward/play triangle. Agent is ready to execute.",
    center: `
      <path d="M244,238 L276,256 L244,274 Z" fill="#fff"/>
    `
  },
  {
    name: "Neural Node",
    desc: "Central node with three radiating connections. Neural network / agent hub.",
    center: `
      <circle cx="256" cy="256" r="10" fill="#fff"/>
      <line x1="256" y1="246" x2="256" y2="232" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="265" y1="261" x2="276" y2="270" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="247" y1="261" x2="236" y2="270" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <circle cx="256" cy="230" r="5" fill="#fff"/>
      <circle cx="278" cy="272" r="5" fill="#fff"/>
      <circle cx="234" cy="272" r="5" fill="#fff"/>
    `
  },
  {
    name: "Eye",
    desc: "Watching eye. The agent is aware, observant, intelligent.",
    center: `
      <path d="M230,256 C240,240 260,236 270,236 C280,236 290,245 282,256 C274,267 244,270 230,256Z" fill="#fff"/>
      <circle cx="260" cy="254" r="9" fill="#06b6d4"/>
      <circle cx="262" cy="252" r="4" fill="#0c0a1d"/>
      <circle cx="264" cy="250" r="2" fill="#fff"/>
    `
  },
  {
    name: "Lightning Bolt",
    desc: "Electric bolt. Speed, power, instant execution.",
    center: `
      <path d="M262,230 L248,258 L260,258 L250,282 L270,250 L258,250 Z" fill="#fff"/>
    `
  },
  {
    name: "Brain Circuit",
    desc: "Abstract brain with circuit lines. Intelligent processing.",
    center: `
      <path d="M256,234 C268,234 278,244 278,256 C278,268 268,278 256,278 C244,278 234,268 234,256 C234,244 244,234 256,234Z" fill="none" stroke="#fff" stroke-width="3.5"/>
      <path d="M256,234 C256,248 248,256 240,256" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <path d="M256,278 C256,264 264,256 272,256" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <circle cx="256" cy="256" r="5" fill="#fff"/>
    `
  },
  {
    name: "Aperture Iris",
    desc: "Camera iris/aperture. Focus, precision, zoomed-in on the task.",
    center: `
      <circle cx="256" cy="256" r="20" fill="none" stroke="#fff" stroke-width="3"/>
      <path d="M256,236 L264,249" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <path d="M273,246 L265,260" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <path d="M273,266 L259,263" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <path d="M256,276 L248,263" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <path d="M239,266 L247,252" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <path d="M239,246 L253,249" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <circle cx="256" cy="256" r="6" fill="#fff"/>
    `
  },
  {
    name: "Atom",
    desc: "Tiny atom with orbiting electron. Science, precision, energy.",
    center: `
      <ellipse cx="256" cy="256" rx="22" ry="8" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.7" transform="rotate(0 256 256)"/>
      <ellipse cx="256" cy="256" rx="22" ry="8" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.7" transform="rotate(60 256 256)"/>
      <ellipse cx="256" cy="256" rx="22" ry="8" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.7" transform="rotate(-60 256 256)"/>
      <circle cx="256" cy="256" r="6" fill="#fff"/>
    `
  },
  {
    name: "Pulse Ring",
    desc: "Expanding pulse ring from center. Active, alive, broadcasting.",
    center: `
      <circle cx="256" cy="256" r="22" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.3"/>
      <circle cx="256" cy="256" r="15" fill="none" stroke="#fff" stroke-width="3" opacity="0.6"/>
      <circle cx="256" cy="256" r="7" fill="#fff"/>
    `
  },
  {
    name: "Crosshair Dot",
    desc: "Precision crosshair with center dot. Targeted agent deployment.",
    center: `
      <line x1="256" y1="236" x2="256" y2="248" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="256" y1="264" x2="256" y2="276" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="236" y1="256" x2="248" y2="256" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="264" y1="256" x2="276" y2="256" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <circle cx="256" cy="256" r="5" fill="#fff"/>
    `
  },
  {
    name: "Diamond Gem",
    desc: "Rotated square / diamond. Precious, valuable, the core asset.",
    center: `
      <rect x="244" y="244" width="24" height="24" rx="4" fill="#fff" transform="rotate(45 256 256)"/>
    `
  },
  {
    name: "Waveform",
    desc: "Tiny sound wave / heartbeat. The agent is alive and active.",
    center: `
      <path d="M234,256 L242,256 L247,242 L252,270 L258,238 L263,272 L268,244 L273,256 L280,256" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    `
  },
  {
    name: "Compass",
    desc: "Tiny compass needle. Direction, navigation, finding the way.",
    center: `
      <polygon points="256,234 264,256 256,262 248,256" fill="#fff"/>
      <polygon points="256,278 264,256 256,250 248,256" fill="#fff" opacity="0.5"/>
    `
  }
];

const grid = document.getElementById('grid');
const banner = document.getElementById('banner');

V.forEach((v, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="num">${i + 1}</div>
      <div class="label">${v.name}</div>
    </div>
    <div class="previews">
      <div class="p-dark">${base(96, v.center)}</div>
      <div class="p-light">${base(96, v.center)}</div>
      <div class="p-sm-dark">${base(48, v.center)}</div>
      <div class="p-sm-light">${base(48, v.center)}</div>
      <div class="p-sm-dark">${base(24, v.center)}</div>
    </div>
    <div class="desc">${v.desc}</div>
  `;
  card.onclick = () => {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    banner.textContent = 'Selected: #' + (i+1) + ' — ' + v.name;
    banner.className = 'banner show';
  };
  grid.appendChild(card);
});
</script>
</body>
</html>
