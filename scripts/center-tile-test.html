<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Center Tile — Subtle Directions</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif; padding: 40px; }
  h1 { text-align: center; font-size: 24px; font-weight: 600; margin-bottom: 8px; }
  .subtitle { text-align: center; color: #64748b; margin-bottom: 40px; font-size: 13px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 28px; max-width: 1500px; margin: 0 auto; }
  .card {
    background: #13131a; border: 1px solid #1e1e2e; border-radius: 16px; padding: 28px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    cursor: pointer; transition: all 0.2s;
  }
  .card:hover { border-color: #6366f1; transform: translateY(-2px); }
  .card.selected { border-color: #06b6d4; box-shadow: 0 0 0 2px #06b6d4; }
  .previews { display: flex; gap: 14px; align-items: center; }
  .p-dark { background: #0c0a1d; padding: 14px; border-radius: 16px; }
  .p-light { background: #f0f0f5; padding: 14px; border-radius: 16px; }
  .p-sm-dark { background: #0c0a1d; padding: 6px; border-radius: 8px; }
  .p-sm-light { background: #f0f0f5; padding: 6px; border-radius: 8px; }
  .label { font-size: 14px; font-weight: 600; }
  .desc { font-size: 11px; color: #64748b; text-align: center; line-height: 1.5; }
  .num { background: #1e1e2e; color: #818cf8; width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
  .banner { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #06b6d4; color: #000; padding: 12px 24px; border-radius: 12px; font-weight: 600; font-size: 14px; z-index: 10; }
  .banner.show { display: block; }
</style>
</head>
<body>

<h1>Center Tile — Subtle Directions</h1>
<p class="subtitle">Instead of putting something ON the tile, what if the tile itself is just different?</p>

<div class="grid" id="grid"></div>
<div class="banner" id="banner"></div>

<script>
// The 8 surrounding tiles stay the same; only the center tile area changes
function icon(s, centerTile) {
  return `<svg width="${s}" height="${s}" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="gl${s}" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="wg${s}" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#fff" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <circle cx="256" cy="256" r="200" fill="url(#gl${s})"/>
    <rect x="108" y="108" width="80" height="80" rx="14" fill="#a78bfa" opacity="0.6"/>
    <rect x="216" y="108" width="80" height="80" rx="14" fill="#818cf8" opacity="0.75"/>
    <rect x="324" y="108" width="80" height="80" rx="14" fill="#a78bfa" opacity="0.6"/>
    <rect x="108" y="216" width="80" height="80" rx="14" fill="#818cf8" opacity="0.75"/>
    ${centerTile}
    <rect x="324" y="216" width="80" height="80" rx="14" fill="#818cf8" opacity="0.75"/>
    <rect x="108" y="324" width="80" height="80" rx="14" fill="#a78bfa" opacity="0.6"/>
    <rect x="216" y="324" width="80" height="80" rx="14" fill="#818cf8" opacity="0.75"/>
    <rect x="324" y="324" width="80" height="80" rx="14" fill="#a78bfa" opacity="0.6"/>
  </svg>`;
}

const V = [
  {
    name: "Original (dot)",
    desc: "Current — cyan tile + white dot. For reference.",
    center: `
      <rect x="216" y="216" width="80" height="80" rx="18" fill="#06b6d4"/>
      <circle cx="256" cy="256" r="16" fill="#fff"/>
    `
  },
  {
    name: "No Center Element",
    desc: "Just the cyan tile, nothing on it. Let the color difference do the work.",
    center: `
      <rect x="216" y="216" width="80" height="80" rx="18" fill="#06b6d4"/>
    `
  },
  {
    name: "Hollow Ring",
    desc: "White ring instead of solid dot. Feels like a portal or lens.",
    center: `
      <rect x="216" y="216" width="80" height="80" rx="18" fill="#06b6d4"/>
      <circle cx="256" cy="256" r="16" fill="none" stroke="#fff" stroke-width="4"/>
    `
  },
  {
    name: "Nested Tile",
    desc: "Tiny rounded square inside the tile. Recursive, fractal — a tile within a tile.",
    center: `
      <rect x="216" y="216" width="80" height="80" rx="18" fill="#06b6d4"/>
      <rect x="240" y="240" width="32" height="32" rx="7" fill="#fff" opacity="0.9"/>
    `
  },
  {
    name: "Hollow Nested Tile",
    desc: "Outlined inner square. Clean, architectural.",
    center: `
      <rect x="216" y="216" width="80" height="80" rx="18" fill="#06b6d4"/>
      <rect x="238" y="238" width="36" height="36" rx="8" fill="none" stroke="#fff" stroke-width="4"/>
    `
  },
  {
    name: "Bright Glow Tile",
    desc: "Center tile is brighter/lighter cyan with a soft white inner glow. Just... more alive.",
    center: `
      <rect x="216" y="216" width="80" height="80" rx="18" fill="#22d3ee"/>
      <rect x="216" y="216" width="80" height="80" rx="18" fill="#fff" opacity="0.15"/>
      <rect x="216" y="216" width="80" height="44" rx="18" fill="#fff" opacity="0.1"/>
    `
  },
  {
    name: "White Tile",
    desc: "Center tile is simply white. Maximum contrast, dead simple.",
    center: `
      <rect x="216" y="216" width="80" height="80" rx="18" fill="#fff"/>
    `
  },
  {
    name: "Gradient Tile (no dot)",
    desc: "Center tile has a white-to-cyan gradient. Stands out without needing an element.",
    center: `
      <defs>
        <linearGradient id="ctg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#fff"/>
          <stop offset="100%" stop-color="#06b6d4"/>
        </linearGradient>
      </defs>
      <rect x="216" y="216" width="80" height="80" rx="18" fill="url(#ctg)"/>
    `
  },
  {
    name: "Plus Cross",
    desc: "Thin plus/cross. Suggests 'add', 'more', 'create'. Minimal but meaningful.",
    center: `
      <rect x="216" y="216" width="80" height="80" rx="18" fill="#06b6d4"/>
      <line x1="256" y1="240" x2="256" y2="272" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
      <line x1="240" y1="256" x2="272" y2="256" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    `
  },
  {
    name: "Oversized Center",
    desc: "Center tile is bigger than the rest. Hierarchy through size, not decoration.",
    center: `
      <rect x="206" y="206" width="100" height="100" rx="22" fill="#06b6d4"/>
      <circle cx="256" cy="256" r="12" fill="#fff"/>
    `
  },
  {
    name: "Circular Center",
    desc: "Center is a circle instead of a square. Breaks the pattern just enough.",
    center: `
      <circle cx="256" cy="256" r="42" fill="#06b6d4"/>
      <circle cx="256" cy="256" r="12" fill="#fff"/>
    `
  },
  {
    name: "Double Ring",
    desc: "Two concentric rings. Bullseye / target feel without being aggressive.",
    center: `
      <rect x="216" y="216" width="80" height="80" rx="18" fill="#06b6d4"/>
      <circle cx="256" cy="256" r="18" fill="none" stroke="#fff" stroke-width="3" opacity="0.5"/>
      <circle cx="256" cy="256" r="8" fill="#fff"/>
    `
  },
  {
    name: "Indent / Cutout",
    desc: "Dark circle cut into the cyan tile. Like a button or a socket — something plugs in here.",
    center: `
      <rect x="216" y="216" width="80" height="80" rx="18" fill="#06b6d4"/>
      <circle cx="256" cy="256" r="18" fill="#0c0a1d" opacity="0.6"/>
      <circle cx="256" cy="256" r="8" fill="#06b6d4"/>
    `
  },
  {
    name: "Glass Tile",
    desc: "Semi-transparent white tile with blur feel. Frosted glass, premium, modern.",
    center: `
      <rect x="216" y="216" width="80" height="80" rx="18" fill="#06b6d4"/>
      <rect x="222" y="222" width="68" height="68" rx="14" fill="#fff" opacity="0.2"/>
      <rect x="222" y="222" width="68" height="40" rx="14" fill="#fff" opacity="0.1"/>
    `
  },
  {
    name: "Pill Slot",
    desc: "Horizontal pill/slot shape. Like a power indicator or status light.",
    center: `
      <rect x="216" y="216" width="80" height="80" rx="18" fill="#06b6d4"/>
      <rect x="236" y="248" width="40" height="16" rx="8" fill="#fff" opacity="0.9"/>
    `
  },
  {
    name: "Three Dots",
    desc: "Ellipsis / three dots. 'More to come', 'thinking', 'processing'.",
    center: `
      <rect x="216" y="216" width="80" height="80" rx="18" fill="#06b6d4"/>
      <circle cx="240" cy="256" r="6" fill="#fff"/>
      <circle cx="256" cy="256" r="6" fill="#fff"/>
      <circle cx="272" cy="256" r="6" fill="#fff"/>
    `
  },
  {
    name: "Two Bars",
    desc: "Pause icon / equals sign. Calm, balanced, in-control.",
    center: `
      <rect x="216" y="216" width="80" height="80" rx="18" fill="#06b6d4"/>
      <rect x="242" y="243" width="28" height="8" rx="4" fill="#fff"/>
      <rect x="242" y="261" width="28" height="8" rx="4" fill="#fff"/>
    `
  },
  {
    name: "Empty Center (no tile)",
    desc: "Remove the center tile entirely. The gap becomes the focal point.",
    center: ``
  },
];

const grid = document.getElementById('grid');
const banner = document.getElementById('banner');

V.forEach((v, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="num">${i + 1}</div>
      <div class="label">${v.name}</div>
    </div>
    <div class="previews">
      <div class="p-dark">${icon(96, v.center)}</div>
      <div class="p-light">${icon(96, v.center)}</div>
      <div class="p-sm-dark">${icon(48, v.center)}</div>
      <div class="p-sm-light">${icon(48, v.center)}</div>
      <div class="p-sm-dark">${icon(24, v.center)}</div>
    </div>
    <div class="desc">${v.desc}</div>
  `;
  card.onclick = () => {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    banner.textContent = 'Selected: #' + (i+1) + ' \u2014 ' + v.name;
    banner.className = 'banner show';
  };
  grid.appendChild(card);
});
</script>
</body>
</html>
