<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depot Icon Variations</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif; padding: 40px; }
  h1 { text-align: center; font-size: 28px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.5px; }
  .subtitle { text-align: center; color: #64748b; margin-bottom: 48px; font-size: 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 32px; max-width: 1400px; margin: 0 auto; }
  .card {
    background: #13131a; border: 1px solid #1e1e2e; border-radius: 16px; padding: 32px;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    cursor: pointer; transition: all 0.2s;
  }
  .card:hover { border-color: #6366f1; transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.15); }
  .card.selected { border-color: #06b6d4; box-shadow: 0 0 0 2px #06b6d4, 0 8px 32px rgba(6,182,212,0.2); }
  .previews { display: flex; gap: 24px; align-items: center; }
  .preview-dark, .preview-light { border-radius: 14px; overflow: hidden; }
  .preview-dark { background: #0c0a1d; }
  .preview-light { background: #f0f0f5; }
  .label { font-size: 15px; font-weight: 600; }
  .desc { font-size: 12px; color: #64748b; text-align: center; line-height: 1.5; }
  .number { background: #1e1e2e; color: #818cf8; width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
  .selected-banner { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #06b6d4; color: #000; padding: 12px 24px; border-radius: 12px; font-weight: 600; font-size: 14px; z-index: 10; box-shadow: 0 4px 24px rgba(6,182,212,0.4); }
  .selected-banner.show { display: block; }
</style>
</head>

const grid = document.getElementById('grid');
const banner = document.getElementById('banner');

V.forEach((v, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="number">${i + 1}</div>
      <div class="label">${v.name}</div>
    </div>
    <div class="previews">
      <div class="preview-dark" style="padding:16px;border-radius:18px;">
        ${v.svg(96)}
      </div>
      <div class="preview-light" style="padding:16px;border-radius:18px;">
        ${v.svg(96)}
      </div>
      <div class="preview-dark" style="padding:8px;border-radius:10px;">
        ${v.svg(32)}
      </div>
    </div>
    <div class="desc">${v.desc}</div>
  `;
  card.onclick = () => {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    banner.textContent = 'Selected: #' + (i+1) + ' — ' + v.name;
    banner.classList.add('show');
  };
  grid.appendChild(card);
});
