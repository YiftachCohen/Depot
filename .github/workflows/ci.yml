name: CI

on:
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "apps/online-docs/**"
      - "LICENSE"
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.10"

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck:all

      - name: Lint
        run: bun run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  test-doc-tools:
    name: Test Doc Tools
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run doc tool smoke tests
        run: bun run test:doc-tools

  build-electron:
    name: Build Electron (macOS)
    needs: [lint-and-typecheck, test]
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Electron app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: bun run electron:dist:dev:mac

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-build-macos
          path: apps/electron/release/*.dmg
          if-no-files-found: warn
          retention-days: 7

  build-electron-cross-platform:
    name: Build Electron (${{ matrix.os }})
    if: github.ref == 'refs/heads/main'
    needs: [lint-and-typecheck, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build-script: electron:dist:dev:linux
            artifact-pattern: apps/electron/release/*.AppImage
            artifact-name: electron-build-linux
          - os: windows-latest
            build-script: electron:dist:dev:win
            artifact-pattern: apps/electron/release/*.exe
            artifact-name: electron-build-windows
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Electron app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: bun run ${{ matrix.build-script }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-pattern }}
          if-no-files-found: warn
          retention-days: 7
